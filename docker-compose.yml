name: all2webhook

services:
  postgres:
    image: postgres:16-alpine
    container_name: all2webhook-postgres
    environment:
      POSTGRES_DB: all2webhook
      POSTGRES_USER: all2webhook
      POSTGRES_PASSWORD: all2webhook_password
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  all2webhook:
    build: .
    container_name: all2webhook
    depends_on:
      - postgres
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./data:/app/data
    environment:
      TZ: Asia/Shanghai
      PORT: "8080"
      PUBLIC_PORT: "8081"
      PUBLIC_BASE_URL: http://localhost:8081
      DATABASE_URL: postgres://all2webhook:all2webhook_password@postgres:5432/all2webhook?sslmode=disable
    restart: unless-stopped

volumes:
  postgres_data:
